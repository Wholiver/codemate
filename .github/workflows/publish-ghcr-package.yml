name: publish-ghcr-package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package image
        run: |
          cat > Dockerfile.ghcr <<'EOF'
          FROM alpine:3.20
          LABEL org.opencontainers.image.title="codemate-agent"
          LABEL org.opencontainers.image.description="Codemate CLI container package (beta)"
          LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          LABEL org.opencontainers.image.licenses="MIT"
          CMD ["sh", "-c", "echo codemate-agent package"]
          EOF

          docker build \
            -f Dockerfile.ghcr \
            -t ghcr.io/${{ github.repository_owner }}/codemate-agent:1.0.0-beta.4 \
            -t ghcr.io/${{ github.repository_owner }}/codemate-agent:beta \
            .

      - name: Push package image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/codemate-agent:1.0.0-beta.4
          docker push ghcr.io/${{ github.repository_owner }}/codemate-agent:beta
