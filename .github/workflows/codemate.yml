name: codemate

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codemate:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /codemate') ||
      startsWith(github.event.comment.body, '/codemate')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run codemate
        uses: anomalyco/codemate/github@latest
        env:
          codemate_API_KEY: ${{ secrets.codemate_API_KEY }}
          codemate_PERMISSION: '{"bash": "deny"}'
        with:
          model: codemate/claude-opus-4-5
